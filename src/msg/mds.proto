syntax = "proto3";

package zb.rpc;

option cc_generic_services = true;

enum MdsStatusCode {
  MDS_OK = 0;
  MDS_INVALID_ARGUMENT = 1;
  MDS_NOT_FOUND = 2;
  MDS_ALREADY_EXISTS = 3;
  MDS_NOT_EMPTY = 4;
  MDS_INTERNAL_ERROR = 5;
  MDS_STALE_EPOCH = 6;
}

message MdsStatus {
  MdsStatusCode code = 1;
  string message = 2;
}

enum InodeType {
  INODE_FILE = 0;
  INODE_DIR = 1;
}

enum InodeArchiveState {
  INODE_ARCHIVE_PENDING = 0;
  INODE_ARCHIVE_ARCHIVING = 1;
  INODE_ARCHIVE_ARCHIVED = 2;
}

enum FileReplicaFlag {
  FILE_REPLICA_NONE = 0;
  FILE_REPLICA_DISK_ONLY = 1;
  FILE_REPLICA_OPTICAL_ONLY = 2;
  FILE_REPLICA_DISK_AND_OPTICAL = 3;
}

message InodeAttr {
  uint64 inode_id = 1;
  InodeType type = 2;
  uint32 mode = 3;
  uint32 uid = 4;
  uint32 gid = 5;
  uint64 size = 6;
  uint64 atime = 7;
  uint64 mtime = 8;
  uint64 ctime = 9;
  uint32 nlink = 10;
  uint64 object_unit_size = 11;
  uint32 replica = 12;
  uint64 version = 13;
  InodeArchiveState file_archive_state = 14;
  FileReplicaFlag replica_flag = 15;
}

message Dentry {
  string name = 1;
  uint64 inode_id = 2;
  InodeType type = 3;
}

enum StorageTier {
  STORAGE_TIER_DISK = 0;
  STORAGE_TIER_OPTICAL = 1;
}

enum ReplicaState {
  REPLICA_READY = 0;
  REPLICA_PENDING = 1;
  REPLICA_DEGRADED = 2;
}

message ReplicaLocation {
  string node_id = 1;
  string node_address = 2;
  string disk_id = 3;
  reserved 4;
  string object_id = 19;
  uint64 size = 5;
  uint32 checksum = 6;
  string group_id = 7;
  uint64 epoch = 8;
  string primary_node_id = 9;
  string primary_address = 10;
  string secondary_node_id = 11;
  string secondary_address = 12;
  bool sync_ready = 13;
  StorageTier storage_tier = 14;
  ReplicaState replica_state = 15;
  string image_id = 16;
  uint64 image_offset = 17;
  uint64 image_length = 18;
}

message ObjectMeta {
  uint32 index = 1;
  repeated ReplicaLocation replicas = 2;
}

message DiskFileAnchor {
  string node_id = 1;
  string disk_id = 2;
  string object_id = 3;
  uint64 size = 4;
  ReplicaState replica_state = 5;
}

message OpticalFileAnchor {
  string node_id = 1;
  string disk_id = 2;
  string object_id = 3;
  uint64 size = 4;
  ReplicaState replica_state = 5;
  string image_id = 6;
  uint64 image_offset = 7;
  uint64 image_length = 8;
}

message FileAnchorSet {
  uint32 version = 1;
  uint32 anchor_mask = 2;
  StorageTier primary_tier = 3;
  DiskFileAnchor disk_anchor = 4;
  OpticalFileAnchor optical_anchor = 5;
}

message DiskFileLocation {
  uint64 inode_id = 1;
  string node_id = 2;
  string node_address = 3;
  string disk_id = 4;
  uint64 file_size = 5;
  uint64 object_unit_size = 6;
  uint32 object_count = 7;
  uint64 version = 8;
}

message OpticalFileLocation {
  uint64 inode_id = 1;
  string node_id = 2;
  string node_address = 3;
  string disk_id = 4;
  string image_id = 5;
  string file_id = 6;
  string file_path = 7;
  uint64 file_size = 8;
  uint64 version = 9;
  uint64 mtime_sec = 10;
}

enum PathPlacementTarget {
  PATH_PLACEMENT_UNSPECIFIED = 0;
  PATH_PLACEMENT_REAL_ONLY = 1;
}

message PathPlacementPolicyRecord {
  string path_prefix = 1;
  PathPlacementTarget target = 2;
  bool strict = 3;
}

message LookupRequest {
  string path = 1;
}

message LookupReply {
  MdsStatus status = 1;
  InodeAttr attr = 2;
}

message GetattrRequest {
  uint64 inode_id = 1;
}

message GetattrReply {
  MdsStatus status = 1;
  InodeAttr attr = 2;
}

message OpenRequest {
  string path = 1;
  uint32 flags = 2;
}

message OpenReply {
  MdsStatus status = 1;
  uint64 handle_id = 2;
  InodeAttr attr = 3;
  FileAnchorSet file_anchor = 4;
}

message CloseRequest {
  uint64 handle_id = 1;
}

message CloseReply {
  MdsStatus status = 1;
}

message CreateRequest {
  string path = 1;
  uint32 mode = 2;
  uint32 uid = 3;
  uint32 gid = 4;
  uint32 replica = 5;
  uint64 object_unit_size = 6;
}

message CreateReply {
  MdsStatus status = 1;
  InodeAttr attr = 2;
  FileAnchorSet file_anchor = 3;
}

message MkdirRequest {
  string path = 1;
  uint32 mode = 2;
  uint32 uid = 3;
  uint32 gid = 4;
}

message MkdirReply {
  MdsStatus status = 1;
  InodeAttr attr = 2;
}

message ReaddirRequest {
  string path = 1;
}

message ReaddirReply {
  MdsStatus status = 1;
  repeated Dentry entries = 2;
}

message RenameRequest {
  string old_path = 1;
  string new_path = 2;
}

message RenameReply {
  MdsStatus status = 1;
}

message UnlinkRequest {
  string path = 1;
}

message UnlinkReply {
  MdsStatus status = 1;
}

message RmdirRequest {
  string path = 1;
}

message RmdirReply {
  MdsStatus status = 1;
}

message GetFileAnchorRequest {
  uint64 inode_id = 1;
}

message GetFileAnchorReply {
  MdsStatus status = 1;
  FileAnchorSet anchor = 2;
}

message UpdateInodeStatRequest {
  uint64 inode_id = 1;
  uint64 file_size = 2;
  uint64 object_unit_size = 3;
  uint64 version = 4;
  uint64 mtime = 5;
}

message UpdateInodeStatReply {
  MdsStatus status = 1;
  InodeAttr attr = 2;
}

message ArchiveCandidate {
  string node_id = 1;
  string node_address = 2;
  string disk_id = 3;
  reserved 4;
  uint64 last_access_ts_ms = 5;
  uint64 size_bytes = 6;
  double score = 7;
  uint64 report_ts_ms = 8;
  uint64 checksum = 9;
  double heat_score = 10;
  string archive_state = 11;
  uint64 version = 12;
  string object_id = 13;
}

message ReportArchiveCandidatesRequest {
  string node_id = 1;
  string node_address = 2;
  uint64 report_ts_ms = 3;
  repeated ArchiveCandidate candidates = 4;
}

message ReportArchiveCandidatesReply {
  MdsStatus status = 1;
  uint32 accepted = 2;
  uint32 dropped = 3;
}

message FileArchiveCandidate {
  uint64 inode_id = 1;
  string node_id = 2;
  string node_address = 3;
  string disk_id = 4;
  uint64 file_size = 5;
  uint32 object_count = 6;
  uint64 last_access_ts_ms = 7;
  uint64 report_ts_ms = 8;
  string archive_state = 9;
  uint64 version = 10;
}

message ReportFileArchiveCandidatesRequest {
  string node_id = 1;
  string node_address = 2;
  uint64 report_ts_ms = 3;
  repeated FileArchiveCandidate candidates = 4;
}

message ReportFileArchiveCandidatesReply {
  MdsStatus status = 1;
  uint32 accepted = 2;
  uint32 dropped = 3;
}

enum ArchiveLifecycleState {
  ARCHIVE_STATE_PENDING = 0;
  ARCHIVE_STATE_ARCHIVING = 1;
  reserved 2;
}

message ArchiveLeaseRecord {
  reserved 1;
  reserved 4;
  ArchiveLifecycleState state = 2;
  string owner_node_id = 3;
  string owner_disk_id = 5;
  string lease_id = 6;
  uint64 lease_expire_ts_ms = 7;
  string last_op_id = 8;
  uint64 version = 9;
  uint64 update_ts_ms = 10;
  uint64 archive_ts_ms = 11;
  string object_id = 12;
  uint64 inode_id = 13;
}

message ClaimArchiveTaskRequest {
  string node_id = 1;
  string node_address = 2;
  string disk_id = 3;
  reserved 4;
  uint64 requested_lease_ms = 5;
  string request_id = 6;
  string object_id = 7;
  uint64 inode_id = 8;
}

message ClaimArchiveTaskReply {
  MdsStatus status = 1;
  bool granted = 2;
  ArchiveLeaseRecord record = 3;
}

message RenewArchiveLeaseRequest {
  string node_id = 1;
  reserved 2;
  string lease_id = 3;
  uint64 requested_lease_ms = 4;
  string object_id = 5;
  uint64 inode_id = 6;
}

message RenewArchiveLeaseReply {
  MdsStatus status = 1;
  bool renewed = 2;
  ArchiveLeaseRecord record = 3;
}

message CommitArchiveTaskRequest {
  string node_id = 1;
  reserved 2;
  string lease_id = 3;
  string op_id = 4;
  bool success = 5;
  string error_message = 6;
  string object_id = 7;
  uint64 inode_id = 8;
}

message CommitArchiveTaskReply {
  MdsStatus status = 1;
  bool committed = 2;
  bool idempotent = 3;
  ArchiveLeaseRecord record = 4;
}

message SetPathPlacementPolicyRequest {
  PathPlacementPolicyRecord policy = 1;
}

message SetPathPlacementPolicyReply {
  MdsStatus status = 1;
}

message DeletePathPlacementPolicyRequest {
  string path_prefix = 1;
}

message DeletePathPlacementPolicyReply {
  MdsStatus status = 1;
}

message GetPathPlacementPolicyRequest {
  string path = 1;
}

message GetPathPlacementPolicyReply {
  MdsStatus status = 1;
  bool found = 2;
  PathPlacementPolicyRecord policy = 3;
  string matched_prefix = 4;
}

service MdsService {
  rpc Lookup(LookupRequest) returns (LookupReply);
  rpc Getattr(GetattrRequest) returns (GetattrReply);
  rpc Open(OpenRequest) returns (OpenReply);
  rpc Close(CloseRequest) returns (CloseReply);
  rpc Create(CreateRequest) returns (CreateReply);
  rpc Mkdir(MkdirRequest) returns (MkdirReply);
  rpc Readdir(ReaddirRequest) returns (ReaddirReply);
  rpc Rename(RenameRequest) returns (RenameReply);
  rpc Unlink(UnlinkRequest) returns (UnlinkReply);
  rpc Rmdir(RmdirRequest) returns (RmdirReply);
  rpc GetFileAnchor(GetFileAnchorRequest) returns (GetFileAnchorReply);
  rpc UpdateInodeStat(UpdateInodeStatRequest) returns (UpdateInodeStatReply);
  rpc ReportArchiveCandidates(ReportArchiveCandidatesRequest) returns (ReportArchiveCandidatesReply);
  rpc ReportFileArchiveCandidates(ReportFileArchiveCandidatesRequest) returns (ReportFileArchiveCandidatesReply);
  rpc ClaimArchiveTask(ClaimArchiveTaskRequest) returns (ClaimArchiveTaskReply);
  rpc RenewArchiveLease(RenewArchiveLeaseRequest) returns (RenewArchiveLeaseReply);
  rpc CommitArchiveTask(CommitArchiveTaskRequest) returns (CommitArchiveTaskReply);
  rpc SetPathPlacementPolicy(SetPathPlacementPolicyRequest) returns (SetPathPlacementPolicyReply);
  rpc DeletePathPlacementPolicy(DeletePathPlacementPolicyRequest) returns (DeletePathPlacementPolicyReply);
  rpc GetPathPlacementPolicy(GetPathPlacementPolicyRequest) returns (GetPathPlacementPolicyReply);
}
