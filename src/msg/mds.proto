syntax = "proto3";

package zb.rpc;

option cc_generic_services = true;

enum MdsStatusCode {
  MDS_OK = 0;
  MDS_INVALID_ARGUMENT = 1;
  MDS_NOT_FOUND = 2;
  MDS_ALREADY_EXISTS = 3;
  MDS_NOT_EMPTY = 4;
  MDS_INTERNAL_ERROR = 5;
  MDS_STALE_EPOCH = 6;
}

message MdsStatus {
  MdsStatusCode code = 1;
  string message = 2;
}

enum InodeType {
  INODE_FILE = 0;
  INODE_DIR = 1;
}

message InodeAttr {
  uint64 inode_id = 1;
  InodeType type = 2;
  uint32 mode = 3;
  uint32 uid = 4;
  uint32 gid = 5;
  uint64 size = 6;
  uint64 atime = 7;
  uint64 mtime = 8;
  uint64 ctime = 9;
  uint32 nlink = 10;
  uint64 object_unit_size = 11;
  uint32 replica = 12;
  uint64 version = 13;
}

message Dentry {
  string name = 1;
  uint64 inode_id = 2;
  InodeType type = 3;
}

enum StorageTier {
  STORAGE_TIER_DISK = 0;
  STORAGE_TIER_OPTICAL = 1;
}

enum ReplicaState {
  REPLICA_READY = 0;
  REPLICA_PENDING = 1;
  REPLICA_DEGRADED = 2;
}

enum ReadPlanSource {
  READ_PLAN_SOURCE_UNKNOWN = 0;
  READ_PLAN_SOURCE_LAYOUT = 1;
  READ_PLAN_SOURCE_RESERVED_2 = 2;
  READ_PLAN_SOURCE_OPTICAL = 3;
}

message ReplicaLocation {
  string node_id = 1;
  string node_address = 2;
  string disk_id = 3;
  reserved 4;
  string object_id = 19;
  uint64 size = 5;
  uint32 checksum = 6;
  string group_id = 7;
  uint64 epoch = 8;
  string primary_node_id = 9;
  string primary_address = 10;
  string secondary_node_id = 11;
  string secondary_address = 12;
  bool sync_ready = 13;
  StorageTier storage_tier = 14;
  ReplicaState replica_state = 15;
  string image_id = 16;
  uint64 image_offset = 17;
  uint64 image_length = 18;
}

message ObjectMeta {
  uint32 index = 1;
  repeated ReplicaLocation replicas = 2;
}

message FileLayout {
  uint64 inode_id = 1;
  uint64 object_unit_size = 2;
  repeated ObjectMeta objects = 3;
}

message OpticalReadPlan {
  bool enabled = 1;
  string node_id = 2;
  string node_address = 3;
  string disc_id = 4;
  uint64 inode_id = 5;
  string file_id = 6;
  uint64 file_size = 7;
  uint64 layout_version = 8;
}

message LayoutRoot {
  uint64 inode_id = 1;
  string layout_root_id = 2;
  uint64 layout_version = 3;
  uint64 file_size = 4;
  uint64 epoch = 5;
  uint64 update_ts = 6;
  uint64 object_unit_size = 7;
}

message LayoutExtent {
  uint64 logical_offset = 1;
  uint64 length = 2;
  string object_id = 3;
  uint64 object_offset = 4;
  uint64 object_length = 5;
  uint64 object_version = 6;
  uint32 object_index = 7;
  uint32 pg_id = 8;
  uint64 placement_epoch = 9;
  StorageTier storage_tier = 10;
}

message LookupRequest {
  string path = 1;
}

message LookupReply {
  MdsStatus status = 1;
  InodeAttr attr = 2;
}

message GetattrRequest {
  uint64 inode_id = 1;
}

message GetattrReply {
  MdsStatus status = 1;
  InodeAttr attr = 2;
}

message OpenRequest {
  string path = 1;
  uint32 flags = 2;
}

message OpenReply {
  MdsStatus status = 1;
  uint64 handle_id = 2;
  InodeAttr attr = 3;
}

message CloseRequest {
  uint64 handle_id = 1;
}

message CloseReply {
  MdsStatus status = 1;
}

message CreateRequest {
  string path = 1;
  uint32 mode = 2;
  uint32 uid = 3;
  uint32 gid = 4;
  uint32 replica = 5;
  uint64 object_unit_size = 6;
}

message CreateReply {
  MdsStatus status = 1;
  InodeAttr attr = 2;
}

message MkdirRequest {
  string path = 1;
  uint32 mode = 2;
  uint32 uid = 3;
  uint32 gid = 4;
}

message MkdirReply {
  MdsStatus status = 1;
  InodeAttr attr = 2;
}

message ReaddirRequest {
  string path = 1;
}

message ReaddirReply {
  MdsStatus status = 1;
  repeated Dentry entries = 2;
}

message RenameRequest {
  string old_path = 1;
  string new_path = 2;
}

message RenameReply {
  MdsStatus status = 1;
}

message UnlinkRequest {
  string path = 1;
}

message UnlinkReply {
  MdsStatus status = 1;
}

message RmdirRequest {
  string path = 1;
}

message RmdirReply {
  MdsStatus status = 1;
}

message AllocateWriteRequest {
  uint64 inode_id = 1;
  uint64 offset = 2;
  uint64 size = 3;
}

message AllocateWriteReply {
  MdsStatus status = 1;
  FileLayout layout = 2;
}

message GetLayoutRequest {
  uint64 inode_id = 1;
  uint64 offset = 2;
  uint64 size = 3;
}

message GetLayoutReply {
  MdsStatus status = 1;
  FileLayout layout = 2;
  OpticalReadPlan optical_plan = 3;
  ReadPlanSource plan_source = 4;
}

message CommitWriteRequest {
  uint64 inode_id = 1;
  uint64 new_size = 2;
}

message CommitWriteReply {
  MdsStatus status = 1;
}

message GetLayoutRootRequest {
  uint64 inode_id = 1;
}

message GetLayoutRootReply {
  MdsStatus status = 1;
  LayoutRoot root = 2;
  reserved 3;
}

message ResolveLayoutRequest {
  uint64 inode_id = 1;
  uint64 offset = 2;
  uint64 size = 3;
}

message ResolveLayoutReply {
  MdsStatus status = 1;
  LayoutRoot root = 2;
  repeated LayoutExtent extents = 3;
  FileLayout read_plan = 4;
  reserved 5;
  OpticalReadPlan optical_plan = 6;
  ReadPlanSource plan_source = 7;
}

message CommitLayoutRootRequest {
  uint64 inode_id = 1;
  LayoutRoot root = 2;
  uint64 expected_layout_version = 3;
  bool update_inode_size = 4;
  uint64 new_size = 5;
  string op_id = 6;
}

message CommitLayoutRootReply {
  MdsStatus status = 1;
  LayoutRoot root = 2;
}

message DiskStat {
  string disk_id = 1;
  uint64 capacity_bytes = 2;
  uint64 free_bytes = 3;
  bool is_healthy = 4;
}

message ReportNodeStatusRequest {
  string node_id = 1;
  string address = 2;
  repeated DiskStat disks = 3;
}

message ReportNodeStatusReply {
  MdsStatus status = 1;
}

message ArchiveCandidate {
  string node_id = 1;
  string node_address = 2;
  string disk_id = 3;
  reserved 4;
  uint64 last_access_ts_ms = 5;
  uint64 size_bytes = 6;
  double score = 7;
  uint64 report_ts_ms = 8;
  uint64 checksum = 9;
  double heat_score = 10;
  string archive_state = 11;
  uint64 version = 12;
  string object_id = 13;
}

message ReportArchiveCandidatesRequest {
  string node_id = 1;
  string node_address = 2;
  uint64 report_ts_ms = 3;
  repeated ArchiveCandidate candidates = 4;
}

message ReportArchiveCandidatesReply {
  MdsStatus status = 1;
  uint32 accepted = 2;
  uint32 dropped = 3;
}

enum ArchiveLifecycleState {
  ARCHIVE_STATE_PENDING = 0;
  ARCHIVE_STATE_ARCHIVING = 1;
  ARCHIVE_STATE_ARCHIVED = 2;
}

message ArchiveLeaseRecord {
  reserved 1;
  ArchiveLifecycleState state = 2;
  string owner_node_id = 3;
  string owner_node_address = 4;
  string owner_disk_id = 5;
  string lease_id = 6;
  uint64 lease_expire_ts_ms = 7;
  string last_op_id = 8;
  uint64 version = 9;
  uint64 update_ts_ms = 10;
  uint64 archive_ts_ms = 11;
  string object_id = 12;
}

message ClaimArchiveTaskRequest {
  string node_id = 1;
  string node_address = 2;
  string disk_id = 3;
  reserved 4;
  uint64 requested_lease_ms = 5;
  string request_id = 6;
  string object_id = 7;
}

message ClaimArchiveTaskReply {
  MdsStatus status = 1;
  bool granted = 2;
  ArchiveLeaseRecord record = 3;
}

message RenewArchiveLeaseRequest {
  string node_id = 1;
  reserved 2;
  string lease_id = 3;
  uint64 requested_lease_ms = 4;
  string object_id = 5;
}

message RenewArchiveLeaseReply {
  MdsStatus status = 1;
  bool renewed = 2;
  ArchiveLeaseRecord record = 3;
}

message CommitArchiveTaskRequest {
  string node_id = 1;
  reserved 2;
  string lease_id = 3;
  string op_id = 4;
  bool success = 5;
  string error_message = 6;
  string object_id = 7;
}

message CommitArchiveTaskReply {
  MdsStatus status = 1;
  bool committed = 2;
  bool idempotent = 3;
  ArchiveLeaseRecord record = 4;
}

service MdsService {
  rpc Lookup(LookupRequest) returns (LookupReply);
  rpc Getattr(GetattrRequest) returns (GetattrReply);
  rpc Open(OpenRequest) returns (OpenReply);
  rpc Close(CloseRequest) returns (CloseReply);
  rpc Create(CreateRequest) returns (CreateReply);
  rpc Mkdir(MkdirRequest) returns (MkdirReply);
  rpc Readdir(ReaddirRequest) returns (ReaddirReply);
  rpc Rename(RenameRequest) returns (RenameReply);
  rpc Unlink(UnlinkRequest) returns (UnlinkReply);
  rpc Rmdir(RmdirRequest) returns (RmdirReply);
  rpc AllocateWrite(AllocateWriteRequest) returns (AllocateWriteReply);
  rpc GetLayout(GetLayoutRequest) returns (GetLayoutReply);
  rpc CommitWrite(CommitWriteRequest) returns (CommitWriteReply);
  rpc GetLayoutRoot(GetLayoutRootRequest) returns (GetLayoutRootReply);
  rpc ResolveLayout(ResolveLayoutRequest) returns (ResolveLayoutReply);
  rpc CommitLayoutRoot(CommitLayoutRootRequest) returns (CommitLayoutRootReply);
  rpc ReportNodeStatus(ReportNodeStatusRequest) returns (ReportNodeStatusReply);
  rpc ReportArchiveCandidates(ReportArchiveCandidatesRequest) returns (ReportArchiveCandidatesReply);
  rpc ClaimArchiveTask(ClaimArchiveTaskRequest) returns (ClaimArchiveTaskReply);
  rpc RenewArchiveLease(RenewArchiveLeaseRequest) returns (RenewArchiveLeaseReply);
  rpc CommitArchiveTask(CommitArchiveTaskRequest) returns (CommitArchiveTaskReply);
}
