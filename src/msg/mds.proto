syntax = "proto3";

package zb.rpc;

option cc_generic_services = true;

enum MdsStatusCode {
  MDS_OK = 0;
  MDS_INVALID_ARGUMENT = 1;
  MDS_NOT_FOUND = 2;
  MDS_ALREADY_EXISTS = 3;
  MDS_NOT_EMPTY = 4;
  MDS_INTERNAL_ERROR = 5;
  MDS_STALE_EPOCH = 6;
}

message MdsStatus {
  MdsStatusCode code = 1;
  string message = 2;
}

enum InodeType {
  INODE_FILE = 0;
  INODE_DIR = 1;
}

enum InodeArchiveState {
  INODE_ARCHIVE_PENDING = 0;
  INODE_ARCHIVE_ARCHIVING = 1;
  INODE_ARCHIVE_ARCHIVED = 2;
}

message InodeAttr {
  uint64 inode_id = 1;
  InodeType type = 2;
  uint32 mode = 3;
  uint32 uid = 4;
  uint32 gid = 5;
  uint64 size = 6;
  uint64 atime = 7;
  uint64 mtime = 8;
  uint64 ctime = 9;
  uint32 nlink = 10;
  uint64 object_unit_size = 11;
  uint32 replica = 12;
  uint64 version = 13;
  InodeArchiveState file_archive_state = 14;
}

message Dentry {
  string name = 1;
  uint64 inode_id = 2;
  InodeType type = 3;
}

enum StorageTier {
  STORAGE_TIER_DISK = 0;
  STORAGE_TIER_OPTICAL = 1;
}

enum ReplicaState {
  REPLICA_READY = 0;
  REPLICA_PENDING = 1;
  REPLICA_DEGRADED = 2;
}

message ReplicaLocation {
  string node_id = 1;
  string node_address = 2;
  string disk_id = 3;
  reserved 4;
  string object_id = 19;
  uint64 size = 5;
  uint32 checksum = 6;
  string group_id = 7;
  uint64 epoch = 8;
  string primary_node_id = 9;
  string primary_address = 10;
  string secondary_node_id = 11;
  string secondary_address = 12;
  bool sync_ready = 13;
  StorageTier storage_tier = 14;
  ReplicaState replica_state = 15;
  string image_id = 16;
  uint64 image_offset = 17;
  uint64 image_length = 18;
}

message DiskFileLocation {
  string node_id = 1;
  string node_address = 2;
  string disk_id = 3;
}

message OpticalFileLocation {
  string node_id = 1;
  string node_address = 2;
  string disk_id = 3;
  string image_id = 4;
  string file_id = 5;
  string file_path = 6;
}

message FileLocationView {
  InodeAttr attr = 1;
  DiskFileLocation disk_location = 2;
  OpticalFileLocation optical_location = 3;
}

enum PathPlacementTarget {
  PATH_PLACEMENT_UNSPECIFIED = 0;
  PATH_PLACEMENT_REAL_ONLY = 1;
  PATH_PLACEMENT_VIRTUAL_ONLY = 2;
}

message PathPlacementPolicyRecord {
  string path_prefix = 1;
  PathPlacementTarget target = 2;
  bool strict = 3;
}

message LookupRequest {
  string path = 1;
}

message LookupReply {
  MdsStatus status = 1;
  InodeAttr attr = 2;
}

message GetattrRequest {
  uint64 inode_id = 1;
}

message GetattrReply {
  MdsStatus status = 1;
  InodeAttr attr = 2;
}

message OpenRequest {
  string path = 1;
  uint32 flags = 2;
}

message OpenReply {
  MdsStatus status = 1;
  uint64 handle_id = 2;
  FileLocationView location = 3;
}

message CloseRequest {
  uint64 handle_id = 1;
}

message CloseReply {
  MdsStatus status = 1;
}

message CreateRequest {
  string path = 1;
  uint32 mode = 2;
  uint32 uid = 3;
  uint32 gid = 4;
  uint32 replica = 5;
  uint64 object_unit_size = 6;
}

message CreateReply {
  MdsStatus status = 1;
  FileLocationView location = 2;
}

message MkdirRequest {
  string path = 1;
  uint32 mode = 2;
  uint32 uid = 3;
  uint32 gid = 4;
}

message MkdirReply {
  MdsStatus status = 1;
  InodeAttr attr = 2;
}

message ReaddirRequest {
  string path = 1;
  uint32 limit = 2;
  string start_after = 3;
}

message ReaddirReply {
  MdsStatus status = 1;
  repeated Dentry entries = 2;
  bool has_more = 3;
  string next_token = 4;
}

message RenameRequest {
  string old_path = 1;
  string new_path = 2;
}

message RenameReply {
  MdsStatus status = 1;
}

message UnlinkRequest {
  string path = 1;
}

message UnlinkReply {
  MdsStatus status = 1;
}

message RmdirRequest {
  string path = 1;
}

message RmdirReply {
  MdsStatus status = 1;
}

message GetFileLocationRequest {
  uint64 inode_id = 1;
}

message GetFileLocationReply {
  MdsStatus status = 1;
  FileLocationView location = 2;
}

message UpdateInodeStatRequest {
  uint64 inode_id = 1;
  uint64 file_size = 2;
  uint64 object_unit_size = 3;
  uint64 version = 4;
  uint64 mtime = 5;
}

message UpdateInodeStatReply {
  MdsStatus status = 1;
  InodeAttr attr = 2;
}

message ArchiveCandidate {
  string node_id = 1;
  string node_address = 2;
  string disk_id = 3;
  reserved 4;
  uint64 last_access_ts_ms = 5;
  uint64 size_bytes = 6;
  double score = 7;
  uint64 report_ts_ms = 8;
  uint64 checksum = 9;
  double heat_score = 10;
  string archive_state = 11;
  uint64 version = 12;
  string object_id = 13;
}

message ReportArchiveCandidatesRequest {
  string node_id = 1;
  string node_address = 2;
  uint64 report_ts_ms = 3;
  repeated ArchiveCandidate candidates = 4;
}

message ReportArchiveCandidatesReply {
  MdsStatus status = 1;
  uint32 accepted = 2;
  uint32 dropped = 3;
}

message FileArchiveCandidate {
  uint64 inode_id = 1;
  string node_id = 2;
  string node_address = 3;
  string disk_id = 4;
  uint64 file_size = 5;
  uint32 object_count = 6;
  uint64 last_access_ts_ms = 7;
  uint64 report_ts_ms = 8;
  string archive_state = 9;
  uint64 version = 10;
}

message ReportFileArchiveCandidatesRequest {
  string node_id = 1;
  string node_address = 2;
  uint64 report_ts_ms = 3;
  repeated FileArchiveCandidate candidates = 4;
}

message ReportFileArchiveCandidatesReply {
  MdsStatus status = 1;
  uint32 accepted = 2;
  uint32 dropped = 3;
}

enum ArchiveLifecycleState {
  ARCHIVE_STATE_PENDING = 0;
  ARCHIVE_STATE_ARCHIVING = 1;
  reserved 2;
}

message ArchiveLeaseRecord {
  reserved 1;
  reserved 4;
  ArchiveLifecycleState state = 2;
  string owner_node_id = 3;
  string owner_disk_id = 5;
  string lease_id = 6;
  uint64 lease_expire_ts_ms = 7;
  string last_op_id = 8;
  uint64 version = 9;
  uint64 update_ts_ms = 10;
  uint64 archive_ts_ms = 11;
  string object_id = 12;
  uint64 inode_id = 13;
}

message ClaimArchiveTaskRequest {
  string node_id = 1;
  string node_address = 2;
  string disk_id = 3;
  reserved 4;
  uint64 requested_lease_ms = 5;
  string request_id = 6;
  string object_id = 7;
  uint64 inode_id = 8;
}

message ClaimArchiveTaskReply {
  MdsStatus status = 1;
  bool granted = 2;
  ArchiveLeaseRecord record = 3;
}

message RenewArchiveLeaseRequest {
  string node_id = 1;
  reserved 2;
  string lease_id = 3;
  uint64 requested_lease_ms = 4;
  string object_id = 5;
  uint64 inode_id = 6;
}

message RenewArchiveLeaseReply {
  MdsStatus status = 1;
  bool renewed = 2;
  ArchiveLeaseRecord record = 3;
}

message CommitArchiveTaskRequest {
  string node_id = 1;
  reserved 2;
  string lease_id = 3;
  string op_id = 4;
  bool success = 5;
  string error_message = 6;
  string object_id = 7;
  uint64 inode_id = 8;
}

message CommitArchiveTaskReply {
  MdsStatus status = 1;
  bool committed = 2;
  bool idempotent = 3;
  ArchiveLeaseRecord record = 4;
}

message SetPathPlacementPolicyRequest {
  PathPlacementPolicyRecord policy = 1;
}

message SetPathPlacementPolicyReply {
  MdsStatus status = 1;
}

message DeletePathPlacementPolicyRequest {
  string path_prefix = 1;
}

message DeletePathPlacementPolicyReply {
  MdsStatus status = 1;
}

message GetPathPlacementPolicyRequest {
  string path = 1;
}

message GetPathPlacementPolicyReply {
  MdsStatus status = 1;
  bool found = 2;
  PathPlacementPolicyRecord policy = 3;
  string matched_prefix = 4;
}

message ImportArchiveNamespaceRequest {
  string path_prefix = 1;
  string namespace_id = 2;
  string generation_id = 3;
  uint32 page_size_bytes = 4;
  bool publish_route = 5;
}

message ImportArchiveNamespaceReply {
  MdsStatus status = 1;
  string manifest_path = 2;
  uint64 inode_count = 3;
  uint64 dentry_count = 4;
  uint64 inode_min = 5;
  uint64 inode_max = 6;
}

message ImportMasstreeNamespaceRequest {
  string path_prefix = 1;
  string namespace_id = 2;
  string generation_id = 3;
  uint64 inode_start = 4;
  uint64 file_count = 5;
  uint32 max_files_per_leaf_dir = 6;
  uint32 max_subdirs_per_dir = 7;
  uint32 verify_inode_samples = 8;
  uint32 verify_dentry_samples = 9;
  bool publish_route = 10;
}

message ImportMasstreeNamespaceReply {
  MdsStatus status = 1;
  string manifest_path = 2;
  uint64 root_inode_id = 3;
  uint64 inode_count = 4;
  uint64 dentry_count = 5;
  uint64 inode_min = 6;
  uint64 inode_max = 7;
  uint64 inode_pages_bytes = 8;
  string job_id = 9;
}

enum MasstreeImportJobState {
  MASSTREE_IMPORT_JOB_PENDING = 0;
  MASSTREE_IMPORT_JOB_RUNNING = 1;
  MASSTREE_IMPORT_JOB_COMPLETED = 2;
  MASSTREE_IMPORT_JOB_FAILED = 3;
}

message MasstreeImportJobInfo {
  string job_id = 1;
  string namespace_id = 2;
  string generation_id = 3;
  string path_prefix = 4;
  uint64 file_count = 5;
  MasstreeImportJobState state = 6;
  string error_message = 7;
  string manifest_path = 8;
  uint64 root_inode_id = 9;
  uint64 inode_count = 10;
  uint64 dentry_count = 11;
  uint64 inode_min = 12;
  uint64 inode_max = 13;
  uint64 inode_pages_bytes = 14;
  uint64 level1_dir_count = 15;
  uint64 leaf_dir_count = 16;
  string total_file_bytes = 17;
  uint64 avg_file_size_bytes = 18;
}

message GetMasstreeImportJobRequest {
  string job_id = 1;
}

message GetMasstreeImportJobReply {
  MdsStatus status = 1;
  bool found = 2;
  MasstreeImportJobInfo job = 3;
}

message GetRandomMasstreeFileAttrRequest {
  string namespace_id = 1;
  string path_prefix = 2;
}

message GetRandomMasstreeFileAttrReply {
  MdsStatus status = 1;
  string namespace_id = 2;
  string path_prefix = 3;
  string generation_id = 4;
  uint64 inode_id = 5;
  InodeAttr attr = 6;
  string file_name = 7;
}

message GetMasstreeClusterStatsRequest {
}

message GetMasstreeClusterStatsReply {
  MdsStatus status = 1;
  uint64 disk_node_count = 2;
  uint64 optical_node_count = 3;
  uint64 disk_device_count = 4;
  uint64 optical_device_count = 5;
  string total_capacity_bytes = 6;
  string used_capacity_bytes = 7;
  string free_capacity_bytes = 8;
  uint64 total_file_count = 9;
  string total_file_bytes = 10;
  uint64 avg_file_size_bytes = 11;
  uint32 cursor_node_index = 12;
  uint32 cursor_disk_index = 13;
  uint32 cursor_image_index = 14;
  uint64 cursor_image_used_bytes = 15;
  string total_metadata_bytes = 16;
  uint64 min_file_size_bytes = 17;
  uint64 max_file_size_bytes = 18;
}

message GetMasstreeNamespaceStatsRequest {
  string namespace_id = 1;
}

message GetMasstreeNamespaceStatsReply {
  MdsStatus status = 1;
  string namespace_id = 2;
  string generation_id = 3;
  uint64 file_count = 4;
  string total_file_bytes = 5;
  uint64 avg_file_size_bytes = 6;
  uint64 start_global_image_id = 7;
  uint64 end_global_image_id = 8;
  uint32 start_cursor_node_index = 9;
  uint32 start_cursor_disk_index = 10;
  uint32 start_cursor_image_index = 11;
  uint64 start_cursor_image_used_bytes = 12;
  uint32 end_cursor_node_index = 13;
  uint32 end_cursor_disk_index = 14;
  uint32 end_cursor_image_index = 15;
  uint64 end_cursor_image_used_bytes = 16;
  string total_metadata_bytes = 17;
}

service MdsService {
  rpc Lookup(LookupRequest) returns (LookupReply);
  rpc Getattr(GetattrRequest) returns (GetattrReply);
  rpc Open(OpenRequest) returns (OpenReply);
  rpc Close(CloseRequest) returns (CloseReply);
  rpc Create(CreateRequest) returns (CreateReply);
  rpc Mkdir(MkdirRequest) returns (MkdirReply);
  rpc Readdir(ReaddirRequest) returns (ReaddirReply);
  rpc Rename(RenameRequest) returns (RenameReply);
  rpc Unlink(UnlinkRequest) returns (UnlinkReply);
  rpc Rmdir(RmdirRequest) returns (RmdirReply);
  rpc GetFileLocation(GetFileLocationRequest) returns (GetFileLocationReply);
  rpc UpdateInodeStat(UpdateInodeStatRequest) returns (UpdateInodeStatReply);
  rpc ReportArchiveCandidates(ReportArchiveCandidatesRequest) returns (ReportArchiveCandidatesReply);
  rpc ReportFileArchiveCandidates(ReportFileArchiveCandidatesRequest) returns (ReportFileArchiveCandidatesReply);
  rpc ClaimArchiveTask(ClaimArchiveTaskRequest) returns (ClaimArchiveTaskReply);
  rpc RenewArchiveLease(RenewArchiveLeaseRequest) returns (RenewArchiveLeaseReply);
  rpc CommitArchiveTask(CommitArchiveTaskRequest) returns (CommitArchiveTaskReply);
  rpc SetPathPlacementPolicy(SetPathPlacementPolicyRequest) returns (SetPathPlacementPolicyReply);
  rpc DeletePathPlacementPolicy(DeletePathPlacementPolicyRequest) returns (DeletePathPlacementPolicyReply);
  rpc GetPathPlacementPolicy(GetPathPlacementPolicyRequest) returns (GetPathPlacementPolicyReply);
  rpc ImportArchiveNamespace(ImportArchiveNamespaceRequest) returns (ImportArchiveNamespaceReply);
  rpc ImportMasstreeNamespace(ImportMasstreeNamespaceRequest) returns (ImportMasstreeNamespaceReply);
  rpc GetMasstreeImportJob(GetMasstreeImportJobRequest) returns (GetMasstreeImportJobReply);
  rpc GetRandomMasstreeFileAttr(GetRandomMasstreeFileAttrRequest) returns (GetRandomMasstreeFileAttrReply);
  rpc GetMasstreeClusterStats(GetMasstreeClusterStatsRequest) returns (GetMasstreeClusterStatsReply);
  rpc GetMasstreeNamespaceStats(GetMasstreeNamespaceStatsRequest) returns (GetMasstreeNamespaceStatsReply);
}
