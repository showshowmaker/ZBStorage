syntax = "proto3";

package zb.rpc;

import "google/protobuf/empty.proto";

option cc_generic_services = true;

enum StatusCode {
  STATUS_OK = 0;
  STATUS_INVALID_ARGUMENT = 1;
  STATUS_NOT_FOUND = 2;
  STATUS_IO_ERROR = 3;
  STATUS_INTERNAL_ERROR = 4;
}

message Status {
  StatusCode code = 1;
  string message = 2;
}

message WriteObjectRequest {
  string disk_id = 1;
  string object_id = 2;
  uint64 offset = 3;
  bytes data = 4;
  uint64 epoch = 5;
  string archive_op_id = 6;
  uint64 inode_id = 7;
  string file_id = 8;
  string file_path = 9;
  uint64 file_size = 10;
  uint64 file_offset = 11;
  uint32 file_mode = 12;
  uint32 file_uid = 13;
  uint32 file_gid = 14;
  uint64 file_mtime = 15;
  uint32 file_object_index = 16;
  bool is_replication = 17;
}

message WriteObjectReply {
  Status status = 1;
  uint64 bytes = 2;
  string image_id = 3;
  uint64 image_offset = 4;
  uint64 image_length = 5;
}

message ReadObjectRequest {
  string disk_id = 1;
  string object_id = 2;
  uint64 offset = 3;
  uint64 size = 4;
  string image_id = 5;
  uint64 image_offset = 6;
  uint64 image_length = 7;
}

message ReadObjectReply {
  Status status = 1;
  uint64 bytes = 2;
  bytes data = 3;
}

message ReadArchivedFileRequest {
  string disc_id = 1;
  uint64 inode_id = 2;
  string file_id = 3;
  uint64 offset = 4;
  uint64 size = 5;
}

message ReadArchivedFileReply {
  Status status = 1;
  uint64 bytes = 2;
  bytes data = 3;
}

message DeleteObjectRequest {
  string disk_id = 1;
  string object_id = 2;
}

message DeleteObjectReply {
  Status status = 1;
}

message UpdateArchiveStateRequest {
  string disk_id = 1;
  reserved 2;
  string archive_state = 3;
  uint64 version = 4;
  string object_id = 5;
}

message UpdateArchiveStateReply {
  Status status = 1;
}

message DiskReport {
  string id = 1;
  string mount_point = 2;
  uint64 capacity_bytes = 3;
  uint64 free_bytes = 4;
  bool is_healthy = 5;
}

message DiskReportReply {
  Status status = 1;
  repeated DiskReport reports = 2;
}

message FileMeta {
  uint64 inode_id = 1;
  uint64 file_size = 2;
  uint64 object_unit_size = 3;
  uint64 version = 4;
  uint64 mtime_sec = 5;
  uint64 update_ts_ms = 6;
}

message FileObjectSlice {
  uint32 object_index = 1;
  string object_id = 2;
  string disk_id = 3;
  uint64 object_offset = 4;
  uint64 length = 5;
}

message DeleteFileMetaRequest {
  uint64 inode_id = 1;
  string disk_id = 2;
  bool purge_objects = 3;
}

message DeleteFileMetaReply {
  Status status = 1;
}

message ResolveFileReadRequest {
  uint64 inode_id = 1;
  uint64 offset = 2;
  uint64 size = 3;
  string disk_id = 4;
  uint64 object_unit_size_hint = 5;
}

message ResolveFileReadReply {
  Status status = 1;
  FileMeta meta = 2;
  repeated FileObjectSlice slices = 3;
}

message AllocateFileWriteRequest {
  uint64 inode_id = 1;
  uint64 offset = 2;
  uint64 size = 3;
  string disk_id = 4;
  uint64 object_unit_size_hint = 5;
}

message AllocateFileWriteReply {
  Status status = 1;
  FileMeta meta = 2;
  string txid = 3;
  repeated FileObjectSlice slices = 4;
}

message CommitFileWriteRequest {
  uint64 inode_id = 1;
  string txid = 2;
  uint64 file_size = 3;
  uint64 object_unit_size = 4;
  uint64 expected_version = 5;
  bool allow_create = 6;
  uint64 mtime_sec = 7;
}

message CommitFileWriteReply {
  Status status = 1;
  FileMeta meta = 2;
}

service RealNodeService {
  rpc WriteObject(WriteObjectRequest) returns (WriteObjectReply);
  rpc ReadObject(ReadObjectRequest) returns (ReadObjectReply);
  rpc DeleteObject(DeleteObjectRequest) returns (DeleteObjectReply);
  rpc ReadArchivedFile(ReadArchivedFileRequest) returns (ReadArchivedFileReply);
  rpc UpdateArchiveState(UpdateArchiveStateRequest) returns (UpdateArchiveStateReply);
  rpc GetDiskReport(google.protobuf.Empty) returns (DiskReportReply);
  rpc DeleteFileMeta(DeleteFileMetaRequest) returns (DeleteFileMetaReply);
  rpc ResolveFileRead(ResolveFileReadRequest) returns (ResolveFileReadReply);
  rpc AllocateFileWrite(AllocateFileWriteRequest) returns (AllocateFileWriteReply);
  rpc CommitFileWrite(CommitFileWriteRequest) returns (CommitFileWriteReply);
}
